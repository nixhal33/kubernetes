apiVersion: v1
kind: ConfigMap
metadata:
  name: bank-app-config
data:
  application.properties: |
    spring.datasource.url=jdbc:mysql://mysql:3306/bankappdb?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=UTC
    spring.datasource.username=bankuser
    spring.datasource.password=bankpass123
    spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
    spring.jpa.hibernate.ddl-auto=update
    spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
    spring.jpa.show-sql=true
