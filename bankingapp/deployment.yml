apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bank-app
  template:
    metadata:
      labels:
        app: bank-app
    spec:
      volumes:
        - name: bankapp-config
          configMap:
            name: bank-app-config
      containers:
        - name: bankapp
          image: kubenix/bankapp:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "100Mi"
            limits:
              cpu: "700m"
              memory: "700Mi"
          volumeMounts:
            - name: bankapp-config
              mountPath: /app/config/application.properties
              subPath: application.properties
          env:
            - name: SPRING_CONFIG_LOCATION
              value: "file:/app/config/application.properties"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 90
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 120
            periodSeconds: 90
            failureThreshold: 3

