replicaCount: 1
image:
  repository: kubenix/bankapp
  pullPolicy: Always
  tag: "latest"

resources:
  requests:
    cpu: "150m"
    memory: "150Mi"
  limits:
    cpu: "700m"
    memory: "700Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 3

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

ingress:
  enabled: false

