replicaCount: 1
image:
  repository: kubenix/ecommerce-site
  pullPolicy: Always
  tag: "599b870"

resources:
  requests:
    cpu: "30m"
    memory: "30Mi"
  limits:
    cpu: "100m"
    memory: "100Mi"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

livenessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /
    port: 80
  initialDelaySeconds: 60
  periodSeconds: 30
  failureThreshold: 3

service:
  type: ClusterIP
  port: 80
  targetPort: 80

ingress:
  enabled: false

